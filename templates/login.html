<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book Search App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9;}
        .login-container { text-align: center; margin-top: 100px; }
        input[type="text"] { padding: 10px; width: 300px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        p { color: #555; font-size: 14px}
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Book Search App</h1>
        <p>Enter a UserID to log in. If you're a new user, an account will be made for you.</p>
        <form method="POST">
            <input type="text" name="user_id" placeholder="Enter your UserID..." required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
