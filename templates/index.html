<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Search App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .search-container { text-align: center; margin-bottom: 30px; }
        input[type="text"] { padding: 10px; width: 300px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }

        /*user info bar*/
        .user-bar { text-align: right; margin-bottom: 10px; font-size: 14px; color: #555; }
        .user-bar a { color: #333; text-decoration: none; margin-left: 10px; }
        .user-bar a:hover {text-decoration: underline;}
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .book-cover {
            max-width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!--show logged in userID with logout link-->
    <div class="user-bar">
        Logged in as: <strong>{{ user_id }}</strong>
        <a href="/logout">Logout</a>
    </div>

    <div class="search-container">
        <h1>Search for a Book</h1>
        <form method="POST">
            <input type="text" name="search_query" placeholder="Enter book title..." value="{{ search_query }}" required>
            <button type="submit">Search</button>
        </form>
    </div>

    <div class="results-grid">
        {% for book in books %}
            <div class="book-card">
                {% if book[2] %}
                    <img src="{{ book[2] }}" alt="Cover of {{ book[0] }}" class="book-cover">
                {% else %}
                    <div class="book-cover" style="background: #e0e0e0; display: flex; align-items: center; justify-content: center;">
                        <p>No Cover Found</p>
                    </div>
                {% endif %}
                <h3>{{ book[0] }}</h3>
                <p><i>{{ book[1] }}</i></p>
            </div>
        {% else %}
            {% if search_query %}
                <p style="text-align: center; width: 100%;">No books found for "{{ search_query }}". Try another title!</p>
            {% endif %}
        {% endfor %}
    </div>

</body>
</html>
